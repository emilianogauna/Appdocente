<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    :root{
      --bg:#0b1020;--bg-soft:#11182b;--panel:#141d33;--panel-2:#192540;--line:#2a3b63;--line-soft:#213050;
      --text:#f4f7fb;--muted:#a7b6d3;--accent:#6bd3ff;--accent-2:#66e3b3;--warn:#ffca7a;--danger:#ff8d8d;
      --ok:#6ce5a1;--shadow:0 18px 40px rgba(5,10,24,.35);--radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;font-family:Segoe UI,system-ui,-apple-system,sans-serif;background:
      radial-gradient(circle at top left, rgba(107,211,255,.16), transparent 30%),
      radial-gradient(circle at top right, rgba(102,227,179,.1), transparent 24%),
      linear-gradient(180deg, #0b1020 0%, #10182c 100%);color:var(--text)}
    body{padding:24px}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:var(--accent)}
    ::selection{background:rgba(107,211,255,.28)}
    .app{max-width:1500px;margin:0 auto;display:grid;gap:18px}
    .hero{background:linear-gradient(135deg, rgba(20,29,51,.92), rgba(13,20,37,.94));border:1px solid rgba(107,211,255,.15);
      box-shadow:var(--shadow);border-radius:28px;padding:24px;display:grid;gap:18px}
    .hero-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .hero h1{margin:0;font-size:clamp(1.8rem,3vw,2.8rem);line-height:1.02}
    .hero p{margin:8px 0 0;color:var(--muted);max-width:780px}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap}
    .stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .stat{background:linear-gradient(180deg, rgba(25,37,64,.95), rgba(18,28,50,.92));border:1px solid rgba(255,255,255,.06);
      border-radius:18px;padding:16px;display:grid;gap:6px;min-height:110px}
    .stat strong{font-size:1.95rem}
    .stat span{font-size:.9rem;color:var(--muted)}
    .layout{display:grid;grid-template-columns:270px minmax(0,1fr);gap:18px;align-items:start}
    .sidebar,.panel{background:rgba(17,24,43,.88);border:1px solid rgba(255,255,255,.06);border-radius:24px;
      box-shadow:var(--shadow);backdrop-filter:blur(12px)}
    .sidebar{padding:16px;position:sticky;top:24px}
    .panel{padding:18px}
    .menu-title{font-size:.82rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin:0 0 10px}
    .menu{display:grid;gap:8px}
    .menu button{width:100%;border:1px solid transparent;background:#111a2f;color:var(--text);text-align:left;padding:12px 14px;
      border-radius:14px;display:flex;justify-content:space-between;align-items:center;transition:.18s ease}
    .menu button:hover{transform:translateY(-1px);border-color:rgba(107,211,255,.22)}
    .menu button.active{background:linear-gradient(135deg, rgba(107,211,255,.18), rgba(102,227,179,.12));border-color:rgba(107,211,255,.34)}
    .section-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
    .section-head h2{margin:0;font-size:1.55rem}
    .section-head p{margin:6px 0 0;color:var(--muted);max-width:760px}
    .grid{display:grid;gap:16px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:linear-gradient(180deg, rgba(25,37,64,.9), rgba(19,29,51,.9));border:1px solid rgba(255,255,255,.06);
      border-radius:20px;padding:16px;display:grid;gap:14px;min-width:0}
    .card h3,.card h4{margin:0}
    .muted{color:var(--muted)}
    .tiny{font-size:.85rem}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(107,211,255,.12);
      color:#c9edff;font-size:.85rem;width:max-content}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .space-between{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{border:none;border-radius:12px;padding:11px 14px;color:#06101b;background:linear-gradient(135deg, var(--accent), #9ce9ff);font-weight:700}
    .btn.secondary{color:var(--text);background:#1b2846;border:1px solid rgba(255,255,255,.08);font-weight:600}
    .btn.ghost{color:var(--text);background:transparent;border:1px solid rgba(255,255,255,.12)}
    .btn.ok{background:linear-gradient(135deg, var(--accent-2), #a1ffd8);color:#052018}
    .btn.warn{background:linear-gradient(135deg, var(--warn), #ffe1a6);color:#352305}
    .btn.danger{background:linear-gradient(135deg, var(--danger), #ffb5b5);color:#2f0d0d}
    .btn.small{padding:8px 11px;font-size:.9rem}
    .form-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:12px}
    .field{display:grid;gap:6px;min-width:0}
    .field label{font-size:.86rem;color:var(--muted)}
    .field input,.field select,.field textarea{width:100%;min-width:0;border-radius:12px;border:1px solid rgba(255,255,255,.09);background:#0f1628;
      color:var(--text);padding:12px 13px}
    .field textarea{resize:vertical;min-height:100px}
    .course-form{grid-template-columns:repeat(12,minmax(0,1fr));gap:16px;align-items:start}
    .course-form .field{align-content:start}
    .course-form .field input:not([type="color"]),.course-form .field select{height:48px;min-height:48px}
    .course-form .field textarea{height:108px;min-height:108px;resize:none}
    .course-form .field input[type="color"]{height:34px;min-height:34px;padding:3px 4px}
    .field-message{display:block;min-height:32px;line-height:1.25;margin:0}
    .field-message.is-empty{visibility:hidden}
    .course-editor-layout{grid-template-columns:minmax(0,1.18fr) minmax(320px,.82fr);align-items:start}
    .course-preview-field input{background:rgba(255,255,255,.04);border-color:rgba(107,211,255,.18);color:#d9e5fb;cursor:default;caret-color:transparent}
    .course-preview-field input:focus{outline:none;box-shadow:none}
    .student-form{align-content:start}
    .assistant-form{display:grid;gap:16px}
    .assistant-actions{display:flex;gap:10px;flex-wrap:wrap}
    .assistant-key-actions{display:flex;gap:10px;flex-wrap:wrap}
    .result-output{width:100%;min-height:320px;max-height:520px;overflow:auto;border-radius:16px;border:1px solid rgba(255,255,255,.08);
      background:#0f1628;color:var(--text);padding:14px 15px;white-space:pre-wrap;line-height:1.45}
    .result-output[readonly]{cursor:default}
    .span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.span-3{grid-column:span 3}
    .list{display:grid;gap:10px}
    .item{border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;background:rgba(10,16,30,.34);display:grid;gap:10px}
    .item-header{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .item p{margin:0;color:var(--muted)}
    .table-wrap{overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:16px}
    table{width:100%;border-collapse:collapse;min-width:720px;background:rgba(10,16,30,.25)}
    th,td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;vertical-align:top}
    th{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:#b6c5e3;background:rgba(255,255,255,.03)}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:.78rem;font-weight:700;border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04)}
    .pill.pending{background:rgba(255,202,122,.14);color:#ffe6b5}.pill.done{background:rgba(108,229,161,.14);color:#c9ffde}
    .pill.high{background:rgba(255,141,141,.14);color:#ffd0d0}.pill.present{background:rgba(108,229,161,.14);color:#c9ffde}
    .pill.absent{background:rgba(255,141,141,.14);color:#ffd0d0}.pill.late{background:rgba(255,202,122,.14);color:#ffe6b5}
    .pill.justified{background:rgba(107,211,255,.14);color:#c9edff}
    .status-toggle{display:flex;gap:6px;flex-wrap:wrap}
    .status-toggle button{border:none;border-radius:999px;padding:7px 11px;background:#1b2846;color:var(--text);font-size:.82rem}
    .status-toggle button.active.present{background:rgba(108,229,161,.22);color:#d5ffe4}
    .status-toggle button.active.absent{background:rgba(255,141,141,.22);color:#ffd7d7}
    .status-toggle button.active.late{background:rgba(255,202,122,.22);color:#ffefc9}
    .status-toggle button.active.justified{background:rgba(107,211,255,.22);color:#d3f2ff}
    .notice{padding:12px 14px;border-radius:14px;border:1px solid rgba(107,211,255,.14);background:rgba(107,211,255,.09);color:#d7f2ff}
    .empty{padding:18px;border:1px dashed rgba(255,255,255,.14);border-radius:16px;color:var(--muted);text-align:center}
    .day-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
    .day-card{border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;background:rgba(255,255,255,.03);min-height:170px;display:grid;gap:8px;align-content:start}
    .day-card h4{margin:0;font-size:1rem}
    @media (max-width:1180px){.stats-grid,.grid.three,.day-board{grid-template-columns:repeat(2,minmax(0,1fr))}.layout{grid-template-columns:1fr}.sidebar{position:static}}
    @media (max-width:980px){.span-8,.span-6{grid-column:span 12}.span-4,.span-3{grid-column:span 6}}
    @media (max-width:760px){body{padding:14px}.stats-grid,.grid.two,.grid.three,.day-board{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}
      .span-12,.span-8,.span-6,.span-4,.span-3{grid-column:auto}.hero,.sidebar,.panel{border-radius:20px}table{min-width:640px}}

    const buildPedagogicalPrompt = (course, tipoContenido, aclaraciones = "") => {
      const courseName = getCourseDisplayName(course);

        "- Cuando corresponda, incluí objetivos, contenidos, actividades, recursos, tiempos, criterios e instrumentos de evaluación.",
        "- Evitá respuestas genéricas o superficiales. Necesito un desarrollo completo y útil para usar o adaptar en clase.",

      ].filter(Boolean).join("\n");
    };
    const generateWithGemini = async (prompt, apiKey) => {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: prompt }]
            }
          ]
        })
      });

      if (!response.ok) {
        let message = "No se pudo generar el contenido con Gemini.";
        try {
          const errorBody = await response.json();
          message = errorBody?.error?.message || message;
        } catch (error) {
          // no-op: usamos el mensaje por defecto
        }
        const wrappedError = new Error(message);
        wrappedError.status = response.status;
        throw wrappedError;
      }

      const payload = await response.json();
      const text = (payload?.candidates || [])
        .flatMap((candidate) => candidate?.content?.parts || [])
        .map((part) => part?.text || "")
        .join("\n")
        .trim();

      if (!text) {
        throw new Error("Gemini no devolvió contenido utilizable.");
      }
      return text;
    };
    const getCourseDisplayName = (course) => {
      if (!course) return "Curso sin nombre";
      const visibleSchool = getCourseDisplaySchool(course);
      const school = visibleSchool === "Sin escuela" ? "" : visibleSchool.trim();
      const yearGrade = (course.yearGrade || "").trim();
      const division = (course.division || "").trim();
      const level = normalizeCourseLevel(course.level || "");
      const subject = getCourseDisplaySubject(course);
      const hasUsefulSubject = subject && subject !== "Sin asignación";
      const yearDivision = [yearGrade, division].filter(Boolean).join(" ");

      if (yearDivision && school) return `${yearDivision} - ${school}`;
      if (yearGrade && school) return `${yearGrade} - ${school}`;
      if (level === "Inicial" && school) return `Sala Inicial - ${school}`;
      if (school && hasUsefulSubject) return `${subject} - ${school}`;
      if (school && level) return `${level} - ${school}`;
      if (course.name) return course.name;
      if (yearDivision) return yearDivision;
      if (hasUsefulSubject) return subject;
      if (level) return level;
      return "Curso sin nombre";
    };
    const inferLegacyRecordType = (level, subject, explicitRecordType) => {
      if (explicitRecordType) return explicitRecordType;
      const cleanSubject = repairLegacyText(subject || "").trim();
      if (!cleanSubject) return "";
      const materias = getCourseCatalogOptions(level, "Materia");
      const cargos = getCourseCatalogOptions(level, "Cargo");
      if (cargos.includes(cleanSubject) && !materias.includes(cleanSubject)) return "Cargo";
      return "Materia";
    };
    const resolveCourseSelectionState = (level, recordType, course) => {
      const subject = repairLegacyText(course.subject || course.catalogSelection || "").trim();
      const explicitCustom = repairLegacyText(course.customSelection || "").trim();
      if (course.catalogSelection === "Otro") {
        return { catalogSelection: "Otro", customSelection: explicitCustom || subject, subject: explicitCustom || subject };
      }
      if (!subject) {
        return { catalogSelection: "", customSelection: "", subject: "" };
      }
      const options = getCourseCatalogOptions(level, recordType);
      if (options.includes(subject)) {
        return { catalogSelection: subject, customSelection: "", subject };
      }
      return { catalogSelection: "Otro", customSelection: explicitCustom || subject, subject: explicitCustom || subject };
    };
    const resolveCourseLocalityState = (course) => {
      const locality = repairLegacyText(course.locality || course.localitySelection || "").trim();
      const explicitCustom = repairLegacyText(course.customLocality || "").trim();
      if (course.localitySelection === "Otro") {
        return { localitySelection: "Otro", customLocality: explicitCustom || locality, locality: explicitCustom || locality };
      }
      if (!locality) {
        return { localitySelection: "", customLocality: "", locality: "" };
      }
      const matchingLocality = findMatchingCatalogOption(SANTA_FE_LOCALITY_OPTIONS, locality);
      if (matchingLocality) {
        return { localitySelection: matchingLocality, customLocality: "", locality: matchingLocality };
      }
      return { localitySelection: "Otro", customLocality: explicitCustom || locality, locality: explicitCustom || locality };
    };
    const resolveCourseSchoolState = (localityValue, course) => {
      const school = repairLegacyText(course.school || "").trim();
      const explicitCustom = repairLegacyText(course.customSchool || "").trim();
      if (course.schoolSelection === "Otra") {
        return { schoolSelection: "Otra", customSchool: explicitCustom || school, school: explicitCustom || school };
      }
      if (course.schoolSelection) {
        const selectedSchool = getSchoolById(course.schoolSelection);
        if (selectedSchool) {
          const localityEntry = getLocalityCatalogEntry(localityValue);
          if (!localityEntry || selectedSchool.localityId === localityEntry.id) {
            return { schoolSelection: selectedSchool.id, customSchool: "", school: selectedSchool.name };
          }
        }
      }
      if (!school) {
        return { schoolSelection: "", customSchool: "", school: "" };
      }
      const matchingSchool = findMatchingSchoolForLocality(localityValue, school);
      if (matchingSchool) {
        return { schoolSelection: matchingSchool.id, customSchool: "", school: matchingSchool.name };
      }
      return { schoolSelection: "Otra", customSchool: explicitCustom || school, school: explicitCustom || school };
    };
    const resolveCourseDivisionState = (course) => {
      const division = repairLegacyText(course.division || "").trim();
      const explicitFormat = repairLegacyText(course.divisionFormat || "").trim();
      const explicitSelection = repairLegacyText(course.divisionSelection || "").trim();
      const explicitCustom = repairLegacyText(course.customDivision || "").trim();

      if (explicitFormat === "Otra") {
        const manualDivision = explicitCustom || division;
        return { divisionFormat: "Otra", divisionSelection: "", customDivision: manualDivision, division: manualDivision };
      }
      if (explicitFormat === "Letras") {
        const matchingLetter = findMatchingCatalogOption(LETTER_DIVISION_OPTIONS, explicitSelection || division);
        return {
          divisionFormat: matchingLetter ? "Letras" : "",
          divisionSelection: matchingLetter || "",
          customDivision: "",
          division: matchingLetter || ""
        };
      }
      if (explicitFormat === "Ordinal") {
        const matchingOrdinal = findMatchingCatalogOption(ORDINAL_DIVISION_OPTIONS, explicitSelection || division);
        return {
          divisionFormat: matchingOrdinal ? "Ordinal" : "",
          divisionSelection: matchingOrdinal || "",
          customDivision: "",
          division: matchingOrdinal || ""
        };
      }
      if (!division) {
        return { divisionFormat: "", divisionSelection: "", customDivision: "", division: "" };
      }
      const matchingLetter = findMatchingCatalogOption(LETTER_DIVISION_OPTIONS, division);
      if (matchingLetter) {
        return { divisionFormat: "Letras", divisionSelection: matchingLetter, customDivision: "", division: matchingLetter };
      }
      const matchingOrdinal = findMatchingCatalogOption(ORDINAL_DIVISION_OPTIONS, division);
      if (matchingOrdinal) {
        return { divisionFormat: "Ordinal", divisionSelection: matchingOrdinal, customDivision: "", division: matchingOrdinal };
      }
      return { divisionFormat: "Otra", divisionSelection: "", customDivision: explicitCustom || division, division: explicitCustom || division };
    };
    const validateManualValue = ({ selection, manualValue, options, requiredMessage, duplicateMessage, otherOption = "Otro" }) => {
      if (selection !== otherOption) return "";
      const cleanValue = (manualValue || "").trim();
      if (!cleanValue) return requiredMessage;
      const duplicateOption = findMatchingCatalogOption(options, cleanValue);
      if (duplicateOption) return typeof duplicateMessage === "function" ? duplicateMessage(duplicateOption, cleanValue) : duplicateMessage;
      return "";
    };
    const validateCourse = (courseForm) => {
      const yearGradeMeta = getCourseYearGradeMeta(courseForm.level);
      const divisionMeta = getCourseDivisionMeta(courseForm.divisionFormat);
      const selectedValue = courseForm.catalogSelection === "Otro" ? (courseForm.customSelection || "").trim() : (courseForm.catalogSelection || "").trim();
      const selectedLocality = getResolvedLocalityValue(courseForm.localitySelection, courseForm.customLocality);
      const schoolOptions = getSchoolsForLocality(selectedLocality);
      const selectedSchoolEntry = courseForm.schoolSelection && courseForm.schoolSelection !== "Otra" ? getSchoolById(courseForm.schoolSelection) : null;
      const selectedSchool = courseForm.schoolSelection === "Otra"
        ? (courseForm.customSchool || "").trim()
        : (selectedSchoolEntry?.name || "").trim();
      const selectedDivision = courseForm.divisionFormat === "Otra"
        ? (courseForm.customDivision || "").trim()
        : (courseForm.divisionSelection || "").trim();
      const hourAmountRaw = String(courseForm.hourLoadAmount ?? "").trim();
      const normalizedHourLoadAmount = normalizeCourseHourAmount(courseForm.hourLoadAmount);

      if (!courseForm.level) return { error: "Falta seleccionar nivel." };
      if (yearGradeMeta.required && !courseForm.yearGrade) return { error: "Falta seleccionar año/grado." };
      if (courseForm.divisionFormat === "Otra" && !selectedDivision) return { error: "Si elegís Otra en división, tenés que completarla." };
      if (courseForm.divisionFormat === "Letras" && selectedDivision && !LETTER_DIVISION_OPTIONS.includes(selectedDivision)) return { error: "La división seleccionada no es válida." };
      if (courseForm.divisionFormat === "Ordinal" && selectedDivision && !ORDINAL_DIVISION_OPTIONS.includes(selectedDivision)) return { error: "La división seleccionada no es válida." };
      if (courseForm.schoolSelection && !selectedLocality) return { error: "No se puede seleccionar escuela sin localidad." };

      const localityManualError = validateManualValue({
        selection: courseForm.localitySelection,
        manualValue: courseForm.customLocality,
        options: SANTA_FE_LOCALITY_OPTIONS,
        requiredMessage: "Falta completar la localidad.",
        duplicateMessage: "Esa localidad ya existe, seleccioná la opción del listado."
      });
      if (localityManualError) return { error: localityManualError };
      if (!selectedLocality) return { error: "Falta seleccionar localidad." };

      if (courseForm.catalogSelection && !courseForm.recordType) return { error: "No se puede cargar materia o cargo sin tipo de registro." };
      if (!courseForm.recordType) return { error: "Falta seleccionar tipo de registro." };
      if (courseForm.catalogSelection && courseForm.catalogSelection !== "Otro" && !getCourseCatalogOptions(courseForm.level, courseForm.recordType).includes(courseForm.catalogSelection)) {
        return { error: "La materia o el cargo seleccionado no corresponde al nivel y tipo elegidos." };
      }

      const manualSelectionError = validateManualValue({
        selection: courseForm.catalogSelection,
        manualValue: courseForm.customSelection,
        options: getCourseCatalogOptions(courseForm.level, courseForm.recordType),
        requiredMessage: courseForm.recordType === "Cargo" ? "Falta completar el cargo." : "Falta completar la materia.",
        duplicateMessage: courseForm.recordType === "Cargo"
          ? "Ese cargo ya existe, seleccioná la opción del listado."
          : "Esa materia ya existe, seleccioná la opción del listado."
      });
      if (manualSelectionError) return { error: manualSelectionError };
      if (!selectedValue) return { error: courseForm.recordType === "Cargo" ? "Falta seleccionar o completar el cargo." : "Falta seleccionar o completar la materia." };

      const schoolManualError = validateManualValue({
        selection: courseForm.schoolSelection,
        manualValue: courseForm.customSchool,
        options: schoolOptions.map((school) => school.name),
        requiredMessage: "Falta completar la escuela.",
        duplicateMessage: "La escuela ya existe, seleccioná la opción del listado.",
        otherOption: "Otra"
      });
      if (schoolManualError) return { error: schoolManualError };

    function normalizeData(raw) {
      const base = buildDemoData();
      if (!raw || typeof raw !== "object") return base;

        teacher: { ...base.teacher, ...(raw.teacher || {}) },
        rationale: { ...base.rationale, ...(raw.rationale || {}) },
        courses: Array.isArray(raw.courses) ? raw.courses.map((course) => {
          const repairedCourse = {
            ...course,
            name: repairLegacyText(course.name || ""),
            subject: repairLegacyText(course.subject || ""),
            level: repairLegacyText(course.level || ""),
            yearGrade: repairLegacyText(course.yearGrade || ""),
            recordType: repairLegacyText(course.recordType || ""),
            catalogSelection: repairLegacyText(course.catalogSelection || ""),
            customSelection: repairLegacyText(course.customSelection || ""),
            school: repairLegacyText(course.school || ""),
            customSchool: repairLegacyText(course.customSchool || ""),
            locality: repairLegacyText(course.locality || ""),
            localitySelection: repairLegacyText(course.localitySelection || ""),
            customLocality: repairLegacyText(course.customLocality || ""),
            province: repairLegacyText(course.province || "Santa Fe"),
            division: repairLegacyText(course.division || ""),

            shift: repairLegacyText(course.shift || course.division || ""),
            positionType: repairLegacyText(course.positionType || "Interino"),
            notes: repairLegacyText(course.notes || "")
          };
          const level = normalizeCourseLevel(repairedCourse.level || "");
          const subject = repairedCourse.subject || repairedCourse.catalogSelection || "";
          const recordType = inferLegacyRecordType(level, subject, repairedCourse.recordType);
          const selectionState = resolveCourseSelectionState(level, recordType, repairedCourse);
          const localityState = resolveCourseLocalityState(repairedCourse);
          const schoolState = resolveCourseSchoolState(localityState.locality, repairedCourse);
          const divisionState = resolveCourseDivisionState(repairedCourse);
          return {
            ...courseDefaults(),
            ...repairedCourse,
            level,
            yearGrade: repairedCourse.yearGrade || "",
            recordType,
            catalogSelection: selectionState.catalogSelection,
            customSelection: selectionState.customSelection,
            subject: selectionState.subject,
            schoolSelection: schoolState.schoolSelection,
            customSchool: schoolState.customSchool,
            localitySelection: localityState.localitySelection,

          };
        }) : base.courses,

      };

    function loadStoredData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return buildDemoData();
        return normalizeData(JSON.parse(raw));
      } catch (error) {
        console.error("No se pudo leer localStorage", error);
        return buildDemoData();
      }
    }

    function saveStoredData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...data, updatedAt: new Date().toISOString() }));
      } catch (error) {
        console.error("No se pudo guardar en localStorage", error);
      }
    }

      useEffect(() => {
        if (!message) return undefined;
        const timer = window.setTimeout(() => setMessage(""), 2600);
        return () => window.clearTimeout(timer);
      }, [message]);

      const courseMap = Object.fromEntries(data.courses.map((course) => [course.id, course]));
      const studentMap = Object.fromEntries(data.students.map((student) => [student.id, student]));

      const pendingReminders = data.reminders.filter((item) => !item.done).length;

      const totalStudents = data.students.length;

        return slot.day === day;
      }).sort((a, b) => a.start.localeCompare(b.start));

      const notify = (text, type = "info") => {
        setMessage(text);
        setMessageType(type);
      };

      const replaceData = (updater) => {
        setData((previous) => {
          const next = typeof updater === "function" ? updater(previous) : updater;
          return { ...next, updatedAt: new Date().toISOString() };
        });
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "agenda-docente-backup.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        notify("Datos exportados en JSON.", "success");
      };

      const handleImportClick = () => {
        if (fileRef.current) fileRef.current.click();
      };

      const handleImportFile = (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          try {
            const parsed = JSON.parse(loadEvent.target.result);
            replaceData(normalizeData(parsed));
            notify("Datos importados correctamente.", "success");
          } catch (error) {
            console.error(error);
            notify("El archivo JSON no es válido.", "error");
          } finally {
            event.target.value = "";
          }
        };
        reader.readAsText(file, "utf-8");
      };

      const attendanceByCourse = data.courses.map((course) => {
        const sessions = data.attendance.filter((session) => session.courseId === course.id);
        const totals = sessions.reduce((acc, session) => {
          session.records.forEach((record) => { acc[record.status] = (acc[record.status] || 0) + 1; });
          return acc;
        }, { present: 0, absent: 0, late: 0, justified: 0 });
        const total = totals.present + totals.absent + totals.late + totals.justified;
        const effectivePresent = totals.present + totals.late + totals.justified;

          <div className="grid three">
            <article className="card">
              <div className="space-between"><h3>Cursos activos</h3><span className="badge">{data.courses.length} curso(s)</span></div>
              {data.courses.length ? (
                <div className="list">
                  {data.courses.map((course) => (
                    <div className="item" key={course.id} style={{ borderColor: course.color }}>
                      <div className="item-header">
                        <div>
                          <h4>{getCourseDisplayName(course)}</h4>
                          <p>{getCourseDisplaySchool(course)} · {getCourseDisplayLocality(course)}</p>
                        </div>
                        <span className="pill">Santa Fe</span>
                      </div>
                      <p>{course.level} · División {course.division || "-"} · Turno {course.shift || "-"} · {course.positionType}</p>
                      <p>{getCourseHourLoadLabel(course)}</p>
                    </div>
                  ))}
                </div>
              ) : <div className="empty">No hay cursos cargados.</div>}
            </article>

            <article className="card">
              <div className="space-between"><h3>Asistencia por curso</h3><span className="badge">{data.attendance.length} jornada(s)</span></div>
              {attendanceByCourse.length ? (
                <div className="list">
                  {attendanceByCourse.map((item) => (
                    <div className="item" key={item.course.id}>
                      <div className="space-between">
                        <strong>{getCourseDisplayName(item.course)}</strong>
                        <span className="pill">{item.rate === null ? "Sin datos" : `${item.rate}%`}</span>
                      </div>
                      <p>{getCourseDisplaySchool(item.course)}</p>
                      <p>Presentes: {item.totals.present || 0} · Tardes: {item.totals.late || 0} · Ausentes: {item.totals.absent || 0} · Justificados: {item.totals.justified || 0}</p>
                    </div>
                  ))}
                </div>
              ) : <div className="empty">No hay cursos para mostrar asistencia.</div>}
            </article>

            <article className="card">
              <div className="space-between"><h3>Recordatorios</h3><span className="badge">{data.reminders.filter((item) => !item.done).length} pendientes</span></div>
              {upcomingReminders.length ? (
                <div className="list">
                  {upcomingReminders.map((item) => (
                    <div className="item" key={item.id}>
                      <div className="item-header">
                        <div>
                          <h4>{item.title}</h4>
                          <p>{formatDate(item.date)} · {getCourseDisplayName(courseMap[item.courseId]) || "General"}</p>
                        </div>
                        <span className={`pill ${item.done ? "done" : "pending"} ${item.priority === "high" ? "high" : ""}`}>{item.done ? "Hecho" : item.priority === "high" ? "Alta" : "Pendiente"}</span>
                      </div>
                      <p>{item.notes || "Sin detalle adicional."}</p>
                    </div>
                  ))}
                </div>
              ) : <div className="empty">No hay recordatorios registrados.</div>}
            </article>
          </div>

          <div className="grid two">
            <article className="card">
              <div className="space-between"><h3>Últimas calificaciones</h3><span className="badge">{data.grades.length} registro(s)</span></div>
              {latestGrades.length ? (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Fecha</th><th>Curso</th><th>Estudiante</th><th>Actividad</th><th>Nota</th></tr></thead>
                    <tbody>
                      {latestGrades.map((grade) => (
                        <tr key={grade.id}>
                          <td>{formatDate(grade.date)}</td>
                          <td>{getCourseDisplayName(courseMap[grade.courseId]) || "Sin curso"}</td>
                          <td>{studentMap[grade.studentId]?.fullName || "Sin estudiante"}</td>
                          <td>{grade.title}</td>
                          <td>{grade.score}/{grade.maxScore}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : <div className="empty">Todavía no hay calificaciones cargadas.</div>}
            </article>

            <article className="card">
              <div className="space-between"><h3>Clases de hoy</h3><span className="badge">{todaySessions.length} bloque(s)</span></div>
              {todaySessions.length ? (
                <div className="list">
                  {todaySessions.map((slot) => (
                    <div className="item" key={slot.id}>
                      <div className="item-header">
                        <div>
                          <h4>{getCourseDisplayName(courseMap[slot.courseId]) || "Curso"}</h4>
                          <p>{getCourseDisplaySubject(courseMap[slot.courseId])} · {slot.start} a {slot.end}</p>
                        </div>
                        {slot.hasBreak ? <span className="pill">Recreo {slot.breakMinutes} min</span> : null}
                      </div>
                      <p>{getCourseDisplaySchool(courseMap[slot.courseId])} · {slot.notes || "Sin observaciones para este bloque."}</p>
                    </div>
                  ))}
                </div>
              ) : <div className="empty">No hay clases cargadas para hoy.</div>}
            </article>
          </div>
        </div>
      );
    }
    function CoursesTab({ data, replaceData, notify }) {
      const [courseForm, setCourseForm] = useState(emptyCourse());
      const [studentForm, setStudentForm] = useState(() => ({ ...emptyStudent(), courseId: data.courses[0]?.id || "" }));
      const [editingCourseId, setEditingCourseId] = useState(null);
      const [editingStudentId, setEditingStudentId] = useState(null);
      const [courseError, setCourseError] = useState("");
      const yearGradeMeta = getCourseYearGradeMeta(courseForm.level);
      const divisionMeta = getCourseDivisionMeta(courseForm.divisionFormat);
      const visibleYearGradeOptions = yearGradeMeta.mode === "select" && courseForm.yearGrade && !yearGradeMeta.options.includes(courseForm.yearGrade)
        ? [...yearGradeMeta.options, courseForm.yearGrade]
        : yearGradeMeta.options;
      const catalogMeta = getCourseCatalogMeta(courseForm.level, courseForm.recordType);
      const localityMeta = getCourseLocalityMeta();
      const schoolMeta = getCourseSchoolMeta(courseForm.localitySelection, courseForm.customLocality);
      const showCustomSelection = courseForm.catalogSelection === "Otro";
      const showCustomLocality = courseForm.localitySelection === "Otro";
      const showCustomSchool = courseForm.schoolSelection === "Otra";
      const selectCatalogOptions = showCustomSelection && !catalogMeta.options.includes("Otro") ? ["Otro", ...catalogMeta.options] : catalogMeta.options;
      const selectSchoolOptions = showCustomSchool && !schoolMeta.options.some((option) => option.id === "Otra") ? [...schoolMeta.options, { id: "Otra", name: "Otra" }] : schoolMeta.options;
      const catalogHint = catalogMeta.hint;
      const hourLoadMeta = getCourseHourLoadMeta(courseForm.hourLoadMode);
      const generatedCourseName = getCourseDisplayName({
        ...courseForm,
        yearGrade: courseForm.yearGrade,
        division: courseForm.divisionFormat === "Otra" ? courseForm.customDivision : courseForm.divisionSelection,
        school: showCustomSchool ? courseForm.customSchool : getCourseDisplaySchool(courseForm),
        subject: showCustomSelection ? courseForm.customSelection : courseForm.catalogSelection
      });

      const updateCourseLevel = (level) => {
        setCourseError("");
        setCourseForm((previous) => {
          const nextLevel = normalizeCourseLevel(level);
          const nextOptions = getCourseCatalogOptions(nextLevel, previous.recordType);
          const canKeepSelection = previous.catalogSelection !== "Otro" && nextOptions.includes(previous.catalogSelection);
          const nextYearGradeMeta = getCourseYearGradeMeta(nextLevel);
          const canKeepYearGrade = nextYearGradeMeta.mode === "free"
            ? Boolean(previous.yearGrade)
            : (!nextYearGradeMeta.disabled && nextYearGradeMeta.options.includes(previous.yearGrade));
          return {
            ...previous,
            level: nextLevel,
            yearGrade: canKeepYearGrade ? previous.yearGrade : "",
            catalogSelection: canKeepSelection ? previous.catalogSelection : "",
            customSelection: canKeepSelection ? previous.customSelection : "",
            subject: canKeepSelection ? previous.catalogSelection : ""
          };
        });
      };

      const updateCourseYearGrade = (yearGrade) => {
        setCourseError("");
        setCourseForm((previous) => ({ ...previous, yearGrade }));
      };
      const updateCourseDivisionFormat = (divisionFormat) => {
        setCourseError("");
        setCourseForm((previous) => {
          const currentDivision = (previous.division || "").trim();
          if (divisionFormat === "Letras") {
            const matchingLetter = findMatchingCatalogOption(LETTER_DIVISION_OPTIONS, currentDivision);
            return {
              ...previous,
              divisionFormat,
              divisionSelection: matchingLetter || "",
              customDivision: "",
              division: matchingLetter || ""
            };
          }
          if (divisionFormat === "Ordinal") {
            const matchingOrdinal = findMatchingCatalogOption(ORDINAL_DIVISION_OPTIONS, currentDivision);
            return {
              ...previous,
              divisionFormat,
              divisionSelection: matchingOrdinal || "",
              customDivision: "",
              division: matchingOrdinal || ""
            };
          }
          if (divisionFormat === "Otra") {
            return {
              ...previous,
              divisionFormat,
              divisionSelection: "",
              customDivision: currentDivision,
              division: currentDivision
            };
          }
          return { ...previous, divisionFormat: "", divisionSelection: "", customDivision: "", division: "" };
        });
      };
      const updateCourseDivisionSelection = (divisionSelection) => {
        setCourseError("");
        setCourseForm((previous) => ({
          ...previous,
          divisionSelection,
          customDivision: "",
          division: divisionSelection
        }));
      };
      const updateCourseCustomDivision = (customDivision) => {
        setCourseError("");
        setCourseForm((previous) => ({
          ...previous,
          customDivision,
          division: previous.divisionFormat === "Otra" ? customDivision : previous.division
        }));
      };

      const updateCourseRecordType = (recordType) => {
        setCourseError("");
        setCourseForm((previous) => {
          const nextOptions = getCourseCatalogOptions(previous.level, recordType);
          const canKeepSelection = previous.catalogSelection !== "Otro" && nextOptions.includes(previous.catalogSelection);
          return {
            ...previous,
            recordType,
            catalogSelection: canKeepSelection ? previous.catalogSelection : "",
            customSelection: canKeepSelection ? previous.customSelection : "",
            subject: canKeepSelection ? previous.catalogSelection : ""
          };
        });
      };

      const updateCourseCatalogSelection = (catalogSelection) => {
        setCourseError("");
        setCourseForm((previous) => ({
          ...previous,
          catalogSelection,
          subject: catalogSelection === "Otro" ? previous.customSelection : catalogSelection,
          customSelection: catalogSelection === "Otro" ? previous.customSelection : ""
        }));
      };

      const updateCourseCustomSelection = (customSelection) => {
        setCourseError("");
        setCourseForm((previous) => ({ ...previous, customSelection, subject: previous.catalogSelection === "Otro" ? customSelection : previous.subject }));
      };

      const updateCourseLocalitySelection = (localitySelection) => {
        setCourseError("");
        setCourseForm((previous) => {
          const previousLocalityValue = getResolvedLocalityValue(previous.localitySelection, previous.customLocality);
          const nextLocalityValue = localitySelection === "Otro" ? previous.customLocality : localitySelection;
          const keepSchool = normalizeComparableText(previousLocalityValue) && normalizeComparableText(previousLocalityValue) === normalizeComparableText(nextLocalityValue);
          return {
            ...previous,
            localitySelection,
            locality: localitySelection === "Otro" ? previous.customLocality : localitySelection,
            customLocality: localitySelection === "Otro" ? previous.customLocality : "",
            schoolSelection: keepSchool ? previous.schoolSelection : "",
            customSchool: keepSchool ? previous.customSchool : "",
            school: keepSchool ? previous.school : ""
          };
        });
      };

      const updateCourseCustomLocality = (customLocality) => {
        setCourseError("");
        setCourseForm((previous) => {
          const previousLocalityValue = getResolvedLocalityValue(previous.localitySelection, previous.customLocality);
          const keepSchool = normalizeComparableText(previousLocalityValue) && normalizeComparableText(previousLocalityValue) === normalizeComparableText(customLocality);
          return {
            ...previous,
            customLocality,
            locality: previous.localitySelection === "Otro" ? customLocality : previous.locality,
            schoolSelection: keepSchool ? previous.schoolSelection : "",
            customSchool: keepSchool ? previous.customSchool : "",
            school: keepSchool ? previous.school : ""
          };
        });
      };

      const updateCourseSchoolSelection = (schoolSelection) => {
        setCourseError("");
        setCourseForm((previous) => {
          const selectedSchool = schoolSelection === "Otra" ? null : getSchoolById(schoolSelection);
          return {
            ...previous,
            schoolSelection,
            school: schoolSelection === "Otra" ? previous.customSchool : (selectedSchool?.name || ""),
            customSchool: schoolSelection === "Otra" ? previous.customSchool : ""
          };
        });
      };

      const updateCourseCustomSchool = (customSchool) => {
        setCourseError("");
        setCourseForm((previous) => ({ ...previous, customSchool, school: previous.schoolSelection === "Otra" ? customSchool : previous.school }));
      };

      const updateCoursePositionType = (positionType) => {
        setCourseError("");
        setCourseForm((previous) => {
          const previousDefaultMode = inferCourseHourLoadMode(previous.positionType);
          const shouldUpdateHourLoadMode = !previous.hourLoadMode || previous.hourLoadMode === previousDefaultMode;
          return {
            ...previous,
            positionType,
            hourLoadMode: shouldUpdateHourLoadMode ? inferCourseHourLoadMode(positionType) : previous.hourLoadMode
          };
        });
      };

      const updateCourseHourLoadMode = (hourLoadMode) => {
        setCourseError("");
        setCourseForm((previous) => ({ ...previous, hourLoadMode }));
      };

      const updateCourseHourLoadAmount = (hourLoadAmount) => {
        setCourseError("");
        setCourseForm((previous) => ({ ...previous, hourLoadAmount }));
      };
      const renderCourseFieldMessage = (message = "", extraClassName = "") => (
        <div className={`field-message tiny muted${message ? "" : " is-empty"}${extraClassName ? ` ${extraClassName}` : ""}`}>{message || " "}</div>
      );

      const submitCourse = (event) => {
        event.preventDefault();
        const validation = validateCourse(courseForm);
        if (validation.error) {
          setCourseError(validation.error);
          notify(validation.error, "error");
          return;
        }
        const { manualDivision, manualLocality, manualSchool, manualValue, normalizedHourLoadAmount, selectedDivision, selectedLocality, selectedSchool, selectedValue } = validation.values;
        replaceData((previous) => {
          const hasDivision = Boolean(selectedDivision);
          const nextCourse = {
            ...courseForm,
            id: editingCourseId || uid("course"),
            level: normalizeCourseLevel(courseForm.level),
            yearGrade: courseForm.yearGrade,
            catalogSelection: courseForm.catalogSelection,
            customSelection: courseForm.catalogSelection === "Otro" ? manualValue : "",
            subject: selectedValue,
            schoolSelection: courseForm.schoolSelection,
            customSchool: courseForm.schoolSelection === "Otra" ? manualSchool : "",
            school: selectedSchool,
            localitySelection: courseForm.localitySelection,
            customLocality: courseForm.localitySelection === "Otro" ? manualLocality : "",
            locality: selectedLocality,
            province: courseForm.province || "Santa Fe",
            divisionFormat: hasDivision ? courseForm.divisionFormat : "",
            divisionSelection: hasDivision && courseForm.divisionFormat !== "Otra" ? selectedDivision : "",
            customDivision: hasDivision && courseForm.divisionFormat === "Otra" ? manualDivision : "",
            division: selectedDivision,
            name: getCourseDisplayName({ ...courseForm, school: selectedSchool, subject: selectedValue, division: selectedDivision }),
            hourLoadMode: courseForm.hourLoadMode,
            hourLoadAmount: normalizedHourLoadAmount
          };
          const courses = editingCourseId ? previous.courses.map((course) => course.id === editingCourseId ? nextCourse : course) : [...previous.courses, nextCourse];
          return { ...previous, courses };
        });
        setCourseError("");
        setCourseForm(emptyCourse());
        setEditingCourseId(null);
        notify(editingCourseId ? "Curso actualizado." : "Curso agregado.", "success");
      };

      const submitStudent = (event) => {
        event.preventDefault();
        if (!studentForm.courseId || !studentForm.fullName.trim()) {
          notify("Elegí curso y completá el nombre del estudiante.", "error");
          return;
        }
        replaceData((previous) => {
          const nextStudent = { ...studentForm, id: editingStudentId || uid("stu") };
          const students = editingStudentId ? previous.students.map((student) => student.id === editingStudentId ? nextStudent : student) : [...previous.students, nextStudent];
          return { ...previous, students };
        });
        setStudentForm({ ...emptyStudent(), courseId: data.courses[0]?.id || "" });
        setEditingStudentId(null);
        notify(editingStudentId ? "Estudiante actualizado." : "Estudiante agregado.", "success");
      };

      const deleteCourse = (courseId) => {
        if (!window.confirm("Se eliminará el curso y también sus estudiantes, asistencias, notas y horarios asociados.")) return;
        replaceData((previous) => ({
          ...previous,
          courses: previous.courses.filter((course) => course.id !== courseId),
          students: previous.students.filter((student) => student.courseId !== courseId),
          attendance: previous.attendance.filter((session) => session.courseId !== courseId),
          grades: previous.grades.filter((grade) => grade.courseId !== courseId),
          schedules: previous.schedules.filter((schedule) => schedule.courseId !== courseId),
          resources: previous.resources.map((resource) => resource.courseId === courseId ? { ...resource, courseId: "" } : resource),
          reminders: previous.reminders.map((reminder) => reminder.courseId === courseId ? { ...reminder, courseId: "" } : reminder),
          workLogs: previous.workLogs.map((log) => log.courseId === courseId ? { ...log, courseId: "" } : log)
        }));
        notify("Curso eliminado.", "success");
      };

      const deleteStudent = (studentId) => {
        if (!window.confirm("Se eliminará el estudiante y sus calificaciones asociadas.")) return;
        replaceData((previous) => ({
          ...previous,
          students: previous.students.filter((student) => student.id !== studentId),
          grades: previous.grades.filter((grade) => grade.studentId !== studentId),
          attendance: previous.attendance.map((session) => ({ ...session, records: session.records.filter((record) => record.studentId !== studentId) }))
        }));
        notify("Estudiante eliminado.", "success");
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Cursos y estudiantes</h2>
              <p>Alta, edición y organización de cursos con su padrón de estudiantes.</p>
            </div>
          </section>

          <div className="grid two course-editor-layout">
            <article className="card">
              <h3>{editingCourseId ? "Editar curso" : "Nuevo curso"}</h3>
              <form className="form-grid course-form" onSubmit={submitCourse}>
                <div className="field span-4">
                  <label>Nivel</label>
                  <select value={courseForm.level} onChange={(event) => updateCourseLevel(event.target.value)}>
                    <option value="">Seleccionar</option>
                    {COURSE_LEVELS.map((level) => <option key={level} value={level}>{level}</option>)}
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-4">
                  <label>Año / grado</label>
                  {yearGradeMeta.mode === "free" ? (
                    <input
                      value={courseForm.yearGrade}
                      disabled={yearGradeMeta.disabled}
                      onChange={(event) => updateCourseYearGrade(event.target.value)}
                      placeholder={yearGradeMeta.placeholder}
                    />
                  ) : (
                    <select value={courseForm.yearGrade} disabled={yearGradeMeta.disabled} onChange={(event) => updateCourseYearGrade(event.target.value)}>
                      <option value="">{yearGradeMeta.disabled ? yearGradeMeta.hint : yearGradeMeta.placeholder}</option>
                      {visibleYearGradeOptions.map((option) => <option key={option} value={option}>{option}</option>)}
                    </select>
                  )}
                  {renderCourseFieldMessage(yearGradeMeta.hint)}
                </div>
                <div className="field span-4">
                  <label>Formato de división</label>
                  <select value={courseForm.divisionFormat} onChange={(event) => updateCourseDivisionFormat(event.target.value)}>
                    <option value="">Opcional</option>
                    {DIVISION_FORMAT_OPTIONS.map((format) => <option key={format} value={format}>{format}</option>)}
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-6">
                  <label>Localidad</label>
                  <select value={courseForm.localitySelection} onChange={(event) => updateCourseLocalitySelection(event.target.value)}>
                    <option value="">{localityMeta.hint}</option>
                    {localityMeta.options.map((option) => <option key={option} value={option}>{option}</option>)}
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                {showCustomLocality ? (
                  <div className="field span-12">
                    <label>Localidad personalizada</label>
                    <input value={courseForm.customLocality} onChange={(event) => updateCourseCustomLocality(event.target.value)} placeholder="Escribí la localidad real" />
                    {renderCourseFieldMessage()}
                  </div>
                ) : null}
                <div className="field span-6">
                  <label>Escuela</label>
                  <select value={courseForm.schoolSelection} disabled={schoolMeta.disabled && !showCustomSchool} onChange={(event) => updateCourseSchoolSelection(event.target.value)}>
                    <option value="">{schoolMeta.disabled && !showCustomSchool ? schoolMeta.hint : "Seleccionar escuela"}</option>
                    {selectSchoolOptions.map((option, index) => (
                      <React.Fragment key={option.id}>
                        {option.id === "Otra" && index > 0 ? <option disabled value="__separator__">──────────</option> : null}
                        <option value={option.id}>{option.name}</option>
                      </React.Fragment>
                    ))}
                  </select>
                  {renderCourseFieldMessage(schoolMeta.hint)}
                </div>
                <div className="field span-12">
                  <label>División</label>
                  {divisionMeta.mode === "free" ? (
                    <input
                      value={courseForm.customDivision}
                      disabled={divisionMeta.disabled}
                      onChange={(event) => updateCourseCustomDivision(event.target.value)}
                      placeholder="Ej.: Única, Anexo, Sin división"
                    />
                  ) : (
                    <select value={courseForm.divisionSelection} disabled={divisionMeta.disabled} onChange={(event) => updateCourseDivisionSelection(event.target.value)}>
                      <option value="">{divisionMeta.disabled ? divisionMeta.hint : "Seleccionar división"}</option>
                      {divisionMeta.options.map((option) => <option key={option} value={option}>{option}</option>)}
                    </select>
                  )}
                  {renderCourseFieldMessage(divisionMeta.hint)}
                </div>
                {showCustomSchool ? (
                  <div className="field span-12">
                    <label>Escuela personalizada</label>
                    <input value={courseForm.customSchool} onChange={(event) => updateCourseCustomSchool(event.target.value)} placeholder="Escribí la escuela real" />
                    {renderCourseFieldMessage()}
                  </div>
                ) : null}
                <div className="field span-6">
                  <label>Tipo de registro</label>
                  <select value={courseForm.recordType} onChange={(event) => updateCourseRecordType(event.target.value)}>
                    <option value="">Seleccionar</option>
                    {COURSE_RECORD_TYPES.map((type) => <option key={type} value={type}>{type}</option>)}
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-12">
                  <label>{courseForm.recordType || "Materia / cargo"}</label>
                  <select value={courseForm.catalogSelection} disabled={catalogMeta.disabled && !showCustomSelection} onChange={(event) => updateCourseCatalogSelection(event.target.value)}>
                    <option value="">{catalogMeta.disabled && !showCustomSelection ? catalogHint : courseForm.recordType ? `Seleccionar ${courseForm.recordType.toLowerCase()}` : "Elegí tipo de registro"}</option>
                    {selectCatalogOptions.map((option) => <option key={option} value={option}>{option}</option>)}
                  </select>
                  {renderCourseFieldMessage(catalogHint)}
                </div>
                {showCustomSelection ? (
                  <div className="field span-12">
                    <label>{courseForm.recordType === "Cargo" ? "Cargo personalizado" : "Materia personalizada"}</label>
                    <input
                      value={courseForm.customSelection}
                      onChange={(event) => updateCourseCustomSelection(event.target.value)}
                      placeholder={courseForm.recordType === "Cargo" ? "Escribí el cargo real" : "Escribí la materia real"}
                    />
                    {renderCourseFieldMessage()}
                  </div>
                ) : null}
                <div className="field span-12 course-preview-field">
                  <label>Nombre visible del curso</label>
                  <input value={generatedCourseName} readOnly />
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-3">
                  <label>Turno</label>
                  <input value={courseForm.shift} onChange={(event) => setCourseForm({ ...courseForm, shift: event.target.value })} />
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-3">
                  <label>Tipo de cargo</label>
                  <select value={courseForm.positionType} onChange={(event) => updateCoursePositionType(event.target.value)}>
                    <option>Reemplazo única vez</option>
                    <option>Reemplazo largo</option>
                    <option>Interino</option>
                    <option>Titular</option>
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-3">
                  <label>Modalidad de carga horaria</label>
                  <select value={courseForm.hourLoadMode} onChange={(event) => updateCourseHourLoadMode(event.target.value)}>
                    {COURSE_HOUR_LOAD_MODES.map((mode) => <option key={mode} value={mode}>{mode}</option>)}
                  </select>
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-3">
                  <label>{hourLoadMeta.label}</label>
                  <input type="number" min="0.25" step="0.25" value={courseForm.hourLoadAmount} onChange={(event) => updateCourseHourLoadAmount(event.target.value)} />
                  {renderCourseFieldMessage()}
                </div>
                <div className="field span-12">
                  {renderCourseFieldMessage(hourLoadMeta.help)}
                </div>
                <div className="field span-12">
                  <label>Color</label>
                  <input type="color" value={courseForm.color} onChange={(event) => setCourseForm({ ...courseForm, color: event.target.value })} />
                  {renderCourseFieldMessage()}
                </div>

                    <thead><tr><th>Estudiante</th><th>Curso</th><th>Contacto</th><th>Observaciones</th><th>Acciones</th></tr></thead>

    function AttendanceTab({ data, replaceData, courseMap, notify }) {
      const [selectedCourseId, setSelectedCourseId] = useState(data.courses[0]?.id || "");
      const [selectedDate, setSelectedDate] = useState(todayIso());
      const courseStudents = data.students.filter((student) => student.courseId === selectedCourseId);
      const session = data.attendance.find((item) => item.courseId === selectedCourseId && item.date === selectedDate);
      const sessionRecords = session?.records || [];

      const upsertSession = (updater) => {
        replaceData((previous) => {
          const attendance = [...previous.attendance];
          const index = attendance.findIndex((item) => item.courseId === selectedCourseId && item.date === selectedDate);
          const base = index >= 0 ? clone(attendance[index]) : { id: uid("att"), courseId: selectedCourseId, date: selectedDate, note: "", records: [] };
          const next = updater(base);
          if (index >= 0) attendance[index] = next; else attendance.push(next);
          return { ...previous, attendance };
        });
      };

      const setStatus = (studentId, status) => {
        if (!selectedCourseId) return;
        upsertSession((current) => {
          const records = [...current.records];
          const index = records.findIndex((record) => record.studentId === studentId);
          if (index >= 0) records[index] = { ...records[index], status };
          else records.push({ studentId, status, comment: "" });
          return { ...current, records };
        });
      };

      const setComment = (studentId, comment) => {
        upsertSession((current) => {
          const records = [...current.records];
          const index = records.findIndex((record) => record.studentId === studentId);
          if (index >= 0) records[index] = { ...records[index], comment };
          else records.push({ studentId, status: "present", comment });
          return { ...current, records };
        });
      };

      const markAll = (status) => {
        if (!selectedCourseId) return;
        upsertSession((current) => ({
          ...current,
          records: courseStudents.map((student) => {
            const existing = current.records.find((record) => record.studentId === student.id);
            return { studentId: student.id, status, comment: existing?.comment || "" };
          })
        }));
        notify(`Se marcaron todos como ${status}.`, "success");
      };

      const updateNote = (note) => {
        if (!selectedCourseId) return;
        upsertSession((current) => ({ ...current, note }));
      };
      const getStatus = (studentId) => sessionRecords.find((record) => record.studentId === studentId)?.status || "present";
      const getComment = (studentId) => sessionRecords.find((record) => record.studentId === studentId)?.comment || "";
      const totals = ATTENDANCE_STATES.reduce((acc, state) => {
        acc[state] = courseStudents.filter((student) => getStatus(student.id) === state).length;
        return acc;
      }, {});

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Asistencia</h2>
              <p>Tomá asistencia por curso y fecha. Cada modificación se guarda automáticamente.</p>
            </div>
          </section>

          <div className="card">
            <div className="form-grid">
              <div className="field span-4">
                <label>Curso</label>
                <select value={selectedCourseId} onChange={(event) => setSelectedCourseId(event.target.value)}>
                  <option value="">Seleccionar</option>
                    {data.courses.map((course) => <option key={course.id} value={course.id}>{getCourseDisplayName(course)}</option>)}
                </select>
              </div>
              <div className="field span-4"><label>Fecha</label><input type="date" value={selectedDate} onChange={(event) => setSelectedDate(event.target.value)} /></div>
              <div className="field span-4">
                <label>Resumen</label>
                <div className="row" style={{ minHeight: "46px", alignItems: "center" }}>
                  <span className="pill present">Presentes {totals.present || 0}</span>
                  <span className="pill late">Tarde {totals.late || 0}</span>
                  <span className="pill absent">Ausentes {totals.absent || 0}</span>
                </div>
              </div>
              <div className="row span-12">
                <button className="btn small secondary" type="button" onClick={() => markAll("present")}>Todos presentes</button>
                <button className="btn small secondary" type="button" onClick={() => markAll("absent")}>Todos ausentes</button>
                <button className="btn small secondary" type="button" onClick={() => markAll("late")}>Todos tarde</button>
              </div>
              <div className="field span-12"><label>Nota general de la jornada</label><textarea disabled={!selectedCourseId} value={session?.note || ""} onChange={(event) => updateNote(event.target.value)} placeholder="Observaciones de la clase, incidencias, acuerdos..." /></div>
            </div>
          </div>

          {!selectedCourseId ? <div className="empty">Elegí un curso para tomar asistencia.</div> : !courseStudents.length ? <div className="empty">El curso no tiene estudiantes cargados todavía.</div> : (
            <div className="list">
              {courseStudents.map((student) => (
                <article className="item" key={student.id}>
                  <div className="item-header">
                    <div>
                      <h4>{student.fullName}</h4>
                      <p>{getCourseDisplayName(courseMap[selectedCourseId]) || "Curso"} · {student.contact || "Sin contacto cargado"}</p>
                    </div>
                    <span className={`pill ${getStatus(student.id)}`}>{getStatus(student.id)}</span>
                  </div>
                  <div className="status-toggle">
                    {ATTENDANCE_STATES.map((state) => (
                      <button key={state} className={getStatus(student.id) === state ? `active ${state}` : ""} onClick={() => setStatus(student.id, state)} type="button">
                        {state === "present" ? "Presente" : state === "absent" ? "Ausente" : state === "late" ? "Tarde" : "Justificado"}
                      </button>
                    ))}
                  </div>
                  <div className="field"><label>Comentario individual</label><input value={getComment(student.id)} onChange={(event) => setComment(student.id, event.target.value)} /></div>
                </article>
              ))}
            </div>
          )}
        </div>
      );
    }
    function GradesTab({ data, replaceData, courseMap, studentMap, notify }) {
      const [gradeForm, setGradeForm] = useState(() => ({ ...emptyGrade(), courseId: data.courses[0]?.id || "" }));
      const [selectedCourseId, setSelectedCourseId] = useState(data.courses[0]?.id || "");
      const [editingId, setEditingId] = useState(null);
      const filteredGrades = data.grades.filter((grade) => !selectedCourseId || grade.courseId === selectedCourseId);

      const submit = (event) => {
        event.preventDefault();
        if (!gradeForm.courseId || !gradeForm.studentId || !gradeForm.title.trim()) {
          notify("Completá curso, estudiante y actividad.", "error");
          return;
        }
        replaceData((previous) => {
          const nextGrade = {
            id: editingId || uid("grade"),
            courseId: gradeForm.courseId,
            studentId: gradeForm.studentId,
            title: gradeForm.title,
            term: gradeForm.term,
            type: gradeForm.type,
            score: parseNumber(gradeForm.score),
            maxScore: parseNumber(gradeForm.maxScore),
            date: gradeForm.date,
            comments: gradeForm.comments
          };
          const grades = editingId ? previous.grades.map((grade) => grade.id === editingId ? nextGrade : grade) : [...previous.grades, nextGrade];
          return { ...previous, grades };
        });
        setGradeForm({ ...emptyGrade(), courseId: data.courses[0]?.id || "" });
        setEditingId(null);
        notify(editingId ? "Calificación actualizada." : "Calificación registrada.", "success");
      };

      const deleteGrade = (gradeId) => {
        replaceData((previous) => ({ ...previous, grades: previous.grades.filter((grade) => grade.id !== gradeId) }));
        notify("Calificación eliminada.", "success");
      };

      const averages = data.students.filter((student) => !selectedCourseId || student.courseId === selectedCourseId).map((student) => {
        const studentGrades = filteredGrades.filter((grade) => grade.studentId === student.id);
        const totalScore = studentGrades.reduce((acc, grade) => acc + (parseNumber(grade.score) / (parseNumber(grade.maxScore) || 1)) * 10, 0);
        const average = studentGrades.length ? totalScore / studentGrades.length : 0;
        return { student, average, count: studentGrades.length };
      });

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Calificaciones</h2>
              <p>Registro de evaluaciones, trabajos prácticos y seguimiento de promedios.</p>
            </div>
          </section>

          <div className="grid two">
            <article className="card">
              <h3>{editingId ? "Editar calificación" : "Nueva calificación"}</h3>
              <form className="form-grid" onSubmit={submit}>
                <div className="field span-4">
                  <label>Curso</label>
                  <select value={gradeForm.courseId} onChange={(event) => setGradeForm({ ...gradeForm, courseId: event.target.value, studentId: "" })}>
                    <option value="">Seleccionar</option>
                    {data.courses.map((course) => <option key={course.id} value={course.id}>{getCourseDisplayName(course)}</option>)}
                  </select>
                </div>
                <div className="field span-4">
                  <label>Estudiante</label>
                  <select value={gradeForm.studentId} onChange={(event) => setGradeForm({ ...gradeForm, studentId: event.target.value })}>
                    <option value="">Seleccionar</option>
                    {data.students.filter((student) => student.courseId === gradeForm.courseId).map((student) => <option key={student.id} value={student.id}>{student.fullName}</option>)}
                  </select>
                </div>
                <div className="field span-4"><label>Fecha</label><input type="date" value={gradeForm.date} onChange={(event) => setGradeForm({ ...gradeForm, date: event.target.value })} /></div>
                <div className="field span-6"><label>Actividad</label><input value={gradeForm.title} onChange={(event) => setGradeForm({ ...gradeForm, title: event.target.value })} /></div>
                <div className="field span-3">
                  <label>Tipo</label>
                  <select value={gradeForm.type} onChange={(event) => setGradeForm({ ...gradeForm, type: event.target.value })}>
                    <option>Trabajo práctico</option><option>Evaluación escrita</option><option>Exposición oral</option><option>Proyecto</option>
                  </select>
                </div>
                <div className="field span-3">
                  <label>Trimestre</label>
                  <select value={gradeForm.term} onChange={(event) => setGradeForm({ ...gradeForm, term: event.target.value })}>
                    <option>1° trimestre</option><option>2° trimestre</option><option>3° trimestre</option>
                  </select>
                </div>
                <div className="field span-3"><label>Nota</label><input type="number" step="0.1" value={gradeForm.score} onChange={(event) => setGradeForm({ ...gradeForm, score: event.target.value })} /></div>
                <div className="field span-3"><label>Puntaje máximo</label><input type="number" step="0.1" value={gradeForm.maxScore} onChange={(event) => setGradeForm({ ...gradeForm, maxScore: event.target.value })} /></div>
                <div className="field span-12"><label>Comentarios</label><textarea value={gradeForm.comments} onChange={(event) => setGradeForm({ ...gradeForm, comments: event.target.value })} /></div>
                <div className="row span-12">
                  <button className="btn" type="submit">{editingId ? "Guardar cambios" : "Registrar calificación"}</button>
                  {editingId ? <button className="btn secondary" type="button" onClick={() => { setEditingId(null); setGradeForm({ ...emptyGrade(), courseId: data.courses[0]?.id || "" }); }}>Cancelar</button> : null}
                </div>
              </form>
            </article>

            <article className="card">
              <div className="space-between">
                <h3>Promedios por estudiante</h3>
                <select value={selectedCourseId} onChange={(event) => setSelectedCourseId(event.target.value)}>
                  <option value="">Todos los cursos</option>
                    {data.courses.map((course) => <option key={course.id} value={course.id}>{getCourseDisplayName(course)}</option>)}
                </select>
              </div>
              {averages.length ? (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Estudiante</th><th>Curso</th><th>Registros</th><th>Promedio /10</th></tr></thead>
                    <tbody>
                      {averages.map(({ student, average, count }) => (
                        <tr key={student.id}>
                          <td>{student.fullName}</td>
                          <td>{getCourseDisplayName(courseMap[student.courseId]) || "-"}</td>
                          <td>{count}</td>
                          <td>{count ? average.toFixed(2) : "-"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : <div className="empty">No hay estudiantes para mostrar en este filtro.</div>}
            </article>
          </div>

          <article className="card">
            <div className="space-between"><h3>Listado de calificaciones</h3><span className="badge">{filteredGrades.length} registro(s)</span></div>
            {filteredGrades.length ? (
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Fecha</th><th>Curso</th><th>Estudiante</th><th>Actividad</th><th>Nota</th><th>Acciones</th></tr></thead>
                  <tbody>
                    {filteredGrades.map((grade) => (
                      <tr key={grade.id}>
                        <td>{formatDate(grade.date)}</td>
                          <td>{getCourseDisplayName(courseMap[grade.courseId]) || "Sin curso"}</td>
                        <td>{studentMap[grade.studentId]?.fullName || "Sin estudiante"}</td>
                        <td><strong>{grade.title}</strong><div className="muted tiny">{grade.type} · {grade.term}</div></td>
                        <td>{grade.score}/{grade.maxScore}</td>
                        <td>
                          <div className="row">
                            <button className="btn small secondary" onClick={() => { setEditingId(grade.id); setGradeForm(clone(grade)); }}>Editar</button>
                            <button className="btn small danger" onClick={() => deleteGrade(grade.id)}>Eliminar</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : <div className="empty">No hay calificaciones para este filtro.</div>}
          </article>
        </div>
      );
    }

    function ScheduleTab({ data, replaceData, courseMap, notify }) {
      const [form, setForm] = useState(() => ({ ...emptySchedule(), courseId: data.courses[0]?.id || "" }));
      const [editingId, setEditingId] = useState(null);

      const submit = (event) => {
        event.preventDefault();
        if (!form.courseId || !form.start || !form.end) {
          notify("Completá curso y horario.", "error");
          return;
        }
        replaceData((previous) => {
          const nextItem = { ...form, id: editingId || uid("sch"), hasBreak: Boolean(form.hasBreak), breakMinutes: form.hasBreak ? parseNumber(form.breakMinutes) : 0 };
          const schedules = editingId ? previous.schedules.map((schedule) => schedule.id === editingId ? nextItem : schedule) : [...previous.schedules, nextItem];
          return { ...previous, schedules };
        });
        setForm({ ...emptySchedule(), courseId: data.courses[0]?.id || "" });
        setEditingId(null);
        notify(editingId ? "Bloque horario actualizado." : "Bloque horario agregado.", "success");
      };

      const remove = (id) => {
        replaceData((previous) => ({ ...previous, schedules: previous.schedules.filter((item) => item.id !== id) }));
        notify("Bloque horario eliminado.", "success");
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Horarios</h2>
              <p>Organización semanal de bloques por curso, día, recreo intermedio y observaciones.</p>

              <h3>{editingId ? "Editar bloque" : "Nuevo bloque horario"}</h3>
