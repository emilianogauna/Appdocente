                  </select>
                </div>
                <div className="field span-3"><label>Inicio</label><input type="time" value={form.start} onChange={(event) => setForm({ ...form, start: event.target.value })} /></div>
                <div className="field span-3"><label>Fin</label><input type="time" value={form.end} onChange={(event) => setForm({ ...form, end: event.target.value })} /></div>
                <div className="field span-3">
                  <label>¿Tiene recreo?</label>
                  <select value={String(form.hasBreak)} onChange={(event) => setForm({ ...form, hasBreak: event.target.value === "true" })}>
                    <option value="false">No</option>
                    <option value="true">Sí</option>
                  </select>
                </div>
                <div className="field span-3"><label>Duración recreo (min)</label><input type="number" min="0" step="1" value={form.breakMinutes} disabled={!form.hasBreak} onChange={(event) => setForm({ ...form, breakMinutes: event.target.value })} /></div>
                <div className="field span-12"><label>Observaciones</label><input value={form.notes} onChange={(event) => setForm({ ...form, notes: event.target.value })} /></div>
                <div className="row span-12">
                  <button className="btn" type="submit">{editingId ? "Guardar bloque" : "Agregar bloque"}</button>
                  {editingId ? <button className="btn secondary" type="button" onClick={() => { setEditingId(null); setForm({ ...emptySchedule(), courseId: data.courses[0]?.id || "" }); }}>Cancelar</button> : null}
                </div>
              </form>
            </article>

            <article className="card">
              <h3>Semana docente</h3>
              <div className="day-board">
                {DAYS.map((day) => {
                  const items = data.schedules.filter((schedule) => schedule.day === day.id).sort((a, b) => a.start.localeCompare(b.start));
                  return (
                    <div className="day-card" key={day.id}>
                      <h4>{day.label}</h4>

          </div>

    function ResourcesTab({ data, replaceData, courseMap, notify }) {
      const [form, setForm] = useState(emptyResource());

    function PlanningTab({ data, notify }) {
      const [form, setForm] = useState({
        courseId: data.courses[0]?.id || "",
        type: "",
        topic: "",
        classCount: "3",
        classDuration: "",
        approach: "Enfoque situado, con articulación entre tecnología, contexto social, proceso productivo y trabajo.",
        teacherNotes: ""
      });
      const [result, setResult] = useState("");
      const [error, setError] = useState("");

      useEffect(() => {
        if (!data.courses.some((course) => course.id === form.courseId)) {
          setForm((previous) => ({ ...previous, courseId: data.courses[0]?.id || "" }));
        }
      }, [data.courses, form.courseId]);

      const requiresClassCount = form.type === "Secuencia didáctica" || form.type === "Planificación de unidad";
      const selectedCourse = data.courses.find((course) => course.id === form.courseId) || null;

      const validatePlanningForm = () => {
        if (!selectedCourse) return "Falta seleccionar un curso.";
        if (!form.type) return "Falta seleccionar el tipo de salida.";
        if (!form.topic.trim()) return "El tema / eje es obligatorio.";
        if (requiresClassCount) {
          const parsedCount = Number(form.classCount);
          if (!Number.isInteger(parsedCount) || parsedCount < 1) {
            return "La cantidad de clases debe ser un número entero mayor o igual a 1.";
          }
        }
        return "";
      };

      const buildParams = () => ({
        topic: form.topic.trim(),
        classCount: Math.max(1, Number(form.classCount) || 1),
        classDuration: form.classDuration.trim(),
        approach: form.approach.trim() || "Enfoque situado, con articulación entre tecnología, contexto social, proceso productivo y trabajo.",
        teacherNotes: form.teacherNotes.trim()
      });

      const generate = () => {
        const validationError = validatePlanningForm();
        if (validationError) {
          setError(validationError);
          return;
        }
        const content = generatePlanningContent(form.type, selectedCourse, buildParams());
        setResult(content);
        setError("");
        notify("Texto pedagógico generado.", "success");
      };

      const copyResult = async () => {
        if (!result) {
          setError("Generá un texto antes de copiarlo.");
          return;
        }
        try {
          await copyTextToClipboard(result);
          setError("");
          notify("Texto copiado al portapapeles.", "success");
        } catch (copyError) {
          console.error(copyError);
          setError("No se pudo copiar el texto generado.");
        }
      };

      const downloadResult = () => {
        if (!result) {
          setError("Generá un texto antes de descargarlo.");
          return;
        }
        const courseSlug = createCatalogId(getCourseDisplayName(selectedCourse) || "curso");
        const typeSlug = createCatalogId(form.type || "planificacion");
        downloadTextFile(result, `${typeSlug}-${courseSlug}-${todayIso()}.txt`);
        setError("");
        notify("Archivo TXT descargado.", "success");
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Planificación</h2>
              <p>Generador pedagógico interno para construir textos completos a partir de los datos del curso, sin usar IA externa.</p>
            </div>
          </section>

          <div className="grid two">
            <article className="card">
              <h3>Generador pedagógico</h3>
              <form className="form-grid" onSubmit={(event) => { event.preventDefault(); generate(); }}>
                <div className="field span-12">
                  <label>Curso</label>
                  <select value={form.courseId} onChange={(event) => setForm({ ...form, courseId: event.target.value })}>
                    <option value="">Seleccionar</option>
                    {data.courses.map((course) => (
                      <option key={course.id} value={course.id}>{getCourseDisplayName(course)}</option>
                    ))}
                  </select>
                </div>
                <div className="field span-12">
                  <label>Tipo de salida</label>
                  <select value={form.type} onChange={(event) => setForm({ ...form, type: event.target.value })}>
                    <option value="">Seleccionar</option>
                    {PLANNING_OUTPUT_TYPES.map((item) => <option key={item} value={item}>{item}</option>)}
                  </select>
                </div>
                <div className="field span-12">
                  <label>Tema / eje</label>
                  <input value={form.topic} onChange={(event) => setForm({ ...form, topic: event.target.value })} placeholder="Ej.: Proceso productivo del lápiz" />
                </div>
                <div className="field span-6">
                  <label>Cantidad de clases</label>
                  <input type="number" min="1" step="1" value={form.classCount} disabled={!requiresClassCount} onChange={(event) => setForm({ ...form, classCount: event.target.value })} />
                </div>
                <div className="field span-6">
                  <label>Duración estimada por clase</label>
                  <input value={form.classDuration} onChange={(event) => setForm({ ...form, classDuration: event.target.value })} placeholder="Ej.: 80 minutos" />
                </div>
                <div className="field span-12">
                  <label>Enfoque pedagógico</label>
                  <textarea value={form.approach} onChange={(event) => setForm({ ...form, approach: event.target.value })} />
                </div>
                <div className="field span-12">
                  <label>Observaciones del docente</label>
                  <textarea value={form.teacherNotes} onChange={(event) => setForm({ ...form, teacherNotes: event.target.value })} />
                </div>

                {error ? (
                  <div className="notice span-12" style={{ borderColor: "rgba(255,141,141,.24)", background: "rgba(255,141,141,.11)", color: "#ffd7d7" }}>
                    {error}
                  </div>
                ) : null}

                <div className="row span-12">
                  <button className="btn" type="submit">Generar</button>
                  <button className="btn secondary" type="button" onClick={copyResult}>Copiar</button>
                  <button className="btn ghost" type="button" onClick={downloadResult}>Descargar TXT</button>
                </div>
              </form>
            </article>

            <article className="card">
              <div className="space-between">
                <h3>Resultado</h3>
                <span className="badge">{form.type || "Sin generar"}</span>
              </div>
              {result ? (
                <textarea className="result-output" value={result} readOnly />
              ) : (
                <div className="empty">Seleccioná un curso, definí el tema y elegí el tipo de salida para generar un texto pedagógico completo.</div>
              )}
            </article>
          </div>
        </div>
      );
    }

    function AIAssistantTab({ data, notify }) {
      const [selectedCourseId, setSelectedCourseId] = useState(data.courses[0]?.id || "");
      const [contentType, setContentType] = useState("");
      const [clarifications, setClarifications] = useState("");
      const [apiKeyInput, setApiKeyInput] = useState(getStoredGeminiApiKey);
      const [result, setResult] = useState("");
      const [statusMessage, setStatusMessage] = useState("");
      const [statusType, setStatusType] = useState("info");
      const [isGenerating, setIsGenerating] = useState(false);

      useEffect(() => {
        if (!data.courses.some((course) => course.id === selectedCourseId)) {
          setSelectedCourseId(data.courses[0]?.id || "");
        }
      }, [data.courses, selectedCourseId]);

      const selectedCourse = data.courses.find((course) => course.id === selectedCourseId) || null;
      const prompt = selectedCourse && contentType
        ? buildPedagogicalPrompt(selectedCourse, contentType, clarifications)
        : "";

      const setLocalStatus = (message, type = "info") => {
        setStatusMessage(message);
        setStatusType(type);
      };

      const saveApiKey = () => {
        const trimmedKey = apiKeyInput.trim();
        if (!trimmedKey) {
          setLocalStatus("Ingresá una API key válida para guardarla.", "error");
          return;
        }
        try {
          localStorage.setItem(GEMINI_API_KEY_STORAGE_KEY, trimmedKey);
          setApiKeyInput(trimmedKey);
          setLocalStatus("API key guardada localmente.", "success");
          notify("API key guardada.", "success");
        } catch (error) {
          console.error(error);
          setLocalStatus("No se pudo guardar la API key en localStorage.", "error");
        }
      };

      const deleteApiKey = () => {
        try {
          localStorage.removeItem(GEMINI_API_KEY_STORAGE_KEY);
          setApiKeyInput("");
          setLocalStatus("API key eliminada.", "success");
          notify("API key eliminada.", "success");
        } catch (error) {
          console.error(error);
          setLocalStatus("No se pudo eliminar la API key.", "error");
        }
      };

      const copyPrompt = async () => {
        if (!selectedCourse) {
          setLocalStatus("Elegí un curso antes de copiar el prompt.", "error");
          return;
        }
        if (!contentType) {
          setLocalStatus("Elegí el tipo de contenido a generar antes de copiar el prompt.", "error");
          return;
        }
        try {
          await copyTextToClipboard(prompt);
          setLocalStatus("Prompt copiado.", "success");
          notify("Prompt copiado.", "success");
        } catch (error) {
          console.error(error);
          setLocalStatus("No se pudo copiar el prompt al portapapeles.", "error");
        }
      };

      const generate = async () => {
        if (!selectedCourse) {
          setLocalStatus("Falta seleccionar un curso.", "error");
          return;
        }
        if (!contentType) {
          setLocalStatus("Falta seleccionar el tipo de contenido.", "error");
          return;
        }
        const trimmedKey = apiKeyInput.trim();
        if (!trimmedKey) {
          setLocalStatus("Para usar IA, ingresá tu API key o usá 'Copiar prompt'.", "error");
          return;
        }

        setIsGenerating(true);
        setLocalStatus("Generando contenido con Gemini...", "info");
        try {
          const generatedText = await generateWithGemini(prompt, trimmedKey);
          setResult(generatedText);
          setLocalStatus("Contenido generado correctamente.", "success");
        } catch (error) {
          console.error(error);
          if (error.status === 400 || error.status === 401 || error.status === 403) {
            setLocalStatus("La API key de Gemini es inválida o no tiene permisos.", "error");
          } else if (error.status === 429) {
            setLocalStatus("Gemini alcanzó el límite de uso. Probá nuevamente más tarde.", "error");
          } else if (error instanceof TypeError) {
            setLocalStatus("Error de red al conectar con Gemini. Verificá tu conexión y volvé a intentar.", "error");
          } else {
            setLocalStatus(error.message || "No se pudo generar el contenido con Gemini.", "error");
          }
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Asistente IA</h2>
              <p>Generá contenido pedagógico a partir de los datos estructurados del curso. Podés usar Gemini con tu API key o copiar el prompt para trabajarlo en otra IA.</p>
            </div>
          </section>

          <div className="grid two">
            <article className="card">
              <form className="assistant-form" onSubmit={(event) => { event.preventDefault(); generate(); }}>
                <div className="field">
                  <label>Curso</label>
                  <select value={selectedCourseId} onChange={(event) => setSelectedCourseId(event.target.value)}>
                    <option value="">Seleccionar</option>
                    {data.courses.map((course) => (
                      <option key={course.id} value={course.id}>{getCourseDisplayName(course)}</option>
                    ))}
                  </select>
                </div>

                <div className="field">
                  <label>Tipo de contenido</label>
                  <select value={contentType} onChange={(event) => setContentType(event.target.value)}>
                    <option value="">Seleccionar</option>
                    {PEDAGOGICAL_CONTENT_TYPES.map((item) => (
                      <option key={item} value={item}>{item}</option>
                    ))}
                  </select>
                </div>

                <div className="field">
                  <label>Aclaraciones adicionales del docente</label>
                  <textarea value={clarifications} onChange={(event) => setClarifications(event.target.value)} placeholder="Podés indicar enfoque, tiempos, prioridades, recursos disponibles, necesidades del grupo, etc." />
                </div>

                <div className="field">
                  <label>API Key de Gemini</label>
                  <input type="password" value={apiKeyInput} onChange={(event) => setApiKeyInput(event.target.value)} placeholder="Ingresá tu API key personal" />
                </div>

                <div className="assistant-key-actions">
                  <button className="btn secondary" type="button" onClick={saveApiKey}>Guardar key</button>
                  <button className="btn ghost" type="button" onClick={deleteApiKey}>Eliminar key</button>
                </div>

                <div className="assistant-actions">
                  <button className="btn" type="submit" disabled={isGenerating}>{isGenerating ? "Generando..." : "Generar con IA"}</button>
                  <button className="btn secondary" type="button" onClick={copyPrompt}>Copiar prompt</button>
                </div>

                {!apiKeyInput.trim() ? (
                  <div className="notice">
                    Para usar IA, ingresá tu API key o usá “Copiar prompt”.
                  </div>
                ) : null}

                {statusMessage ? (
                  <div
                    className="notice"
                    style={{
                      borderColor: statusType === "error" ? "rgba(255,141,141,.24)" : "rgba(107,211,255,.14)",
                      background: statusType === "error" ? "rgba(255,141,141,.11)" : "rgba(107,211,255,.09)",
                      color: statusType === "error" ? "#ffd7d7" : "#d7f2ff"
                    }}
                  >
                    {statusMessage}
                  </div>
                ) : null}
              </form>
            </article>

            <article className="card">
              <div className="space-between">
                <h3>Resultado</h3>
                <span className="badge">{contentType || "Sin tipo seleccionado"}</span>
              </div>
              <div className="field">
                <label>Salida generada</label>
                <textarea className="result-output" value={result} readOnly placeholder="El contenido generado con Gemini aparecerá acá. Si preferís trabajar manualmente, usá “Copiar prompt”." />
              </div>
              {!prompt ? <div className="empty">Elegí un curso y un tipo de contenido para construir el prompt pedagógico.</div> : null}
            </article>
          </div>
        </div>
      );
    }

    function PersonnelTab({ data, replaceData, notify }) {
      const [form, setForm] = useState(() => clone(data.teacher));
      useEffect(() => { setForm(clone(data.teacher)); }, [data.teacher]);
      const submit = (event) => {
        event.preventDefault();
        replaceData((previous) => ({ ...previous, teacher: form }));
        notify("Legajo actualizado.", "success");
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Legajo docente</h2>
              <p>Datos personales, cargo, instituciones, formación y observaciones administrativas.</p>
            </div>
          </section>

          <article className="card">
            <form className="form-grid" onSubmit={submit}>
              <div className="field span-6"><label>Nombre y apellido</label><input value={form.fullName} onChange={(event) => setForm({ ...form, fullName: event.target.value })} /></div>
              <div className="field span-3"><label>DNI</label><input value={form.document} onChange={(event) => setForm({ ...form, document: event.target.value })} /></div>
              <div className="field span-3"><label>Número de legajo</label><input value={form.legajoNumber} onChange={(event) => setForm({ ...form, legajoNumber: event.target.value })} /></div>
              <div className="field span-4"><label>Teléfono</label><input value={form.phone} onChange={(event) => setForm({ ...form, phone: event.target.value })} /></div>
              <div className="field span-4"><label>Email</label><input value={form.email} onChange={(event) => setForm({ ...form, email: event.target.value })} /></div>
              <div className="field span-4"><label>Domicilio</label><input value={form.address} onChange={(event) => setForm({ ...form, address: event.target.value })} /></div>
              <div className="field span-6"><label>Cargo</label><input value={form.position} onChange={(event) => setForm({ ...form, position: event.target.value })} /></div>
              <div className="field span-3"><label>Fecha de ingreso</label><input type="date" value={form.startDate} onChange={(event) => setForm({ ...form, startDate: event.target.value })} /></div>
              <div className="field span-3"><label>Instituciones</label><input value={form.institutions} onChange={(event) => setForm({ ...form, institutions: event.target.value })} /></div>
              <div className="field span-12"><label>Formación y antecedentes</label><textarea value={form.training} onChange={(event) => setForm({ ...form, training: event.target.value })} /></div>
              <div className="field span-12"><label>Observaciones</label><textarea value={form.observations} onChange={(event) => setForm({ ...form, observations: event.target.value })} /></div>
              <div className="row span-12"><button className="btn" type="submit">Guardar legajo</button></div>
            </form>
          </article>
        </div>
      );
    }

    function RationaleTab({ data, replaceData, notify }) {
      const [form, setForm] = useState(() => clone(data.rationale));
      useEffect(() => { setForm(clone(data.rationale)); }, [data.rationale]);
      const submit = (event) => {
        event.preventDefault();
        replaceData((previous) => ({ ...previous, rationale: form }));
        notify("Fundamentación actualizada.", "success");
      };

      return (
        <div className="grid">
          <section className="section-head">
            <div>
              <h2>Fundamentación</h2>
              <p>Base pedagógica editable para planificación, documentación institucional y presentación profesional.</p>
            </div>
          </section>

          <article className="card">
            <form className="form-grid" onSubmit={submit}>
              <div className="field span-12"><label>Fundamentación general</label><textarea value={form.foundation} onChange={(event) => setForm({ ...form, foundation: event.target.value })} /></div>
              <div className="field span-12"><label>Objetivos</label><textarea value={form.objectives} onChange={(event) => setForm({ ...form, objectives: event.target.value })} /></div>
              <div className="field span-12"><label>Metodología</label><textarea value={form.methodology} onChange={(event) => setForm({ ...form, methodology: event.target.value })} /></div>
              <div className="field span-12"><label>Evaluación</label><textarea value={form.evaluation} onChange={(event) => setForm({ ...form, evaluation: event.target.value })} /></div>
              <div className="field span-12"><label>Inclusión y acompañamiento</label><textarea value={form.inclusion} onChange={(event) => setForm({ ...form, inclusion: event.target.value })} /></div>
              <div className="field span-12"><label>Articulación</label><textarea value={form.articulation} onChange={(event) => setForm({ ...form, articulation: event.target.value })} /></div>
              <div className="row span-12"><button className="btn" type="submit">Guardar fundamentación</button></div>
            </form>
          </article>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
